    - tools/scripts/test-api-endpoints.sh
    - tools/scripts/test-builder-flow.sh
    - tools/scripts/test-auth-flow.sh
    - tools/scripts/test-export-features.sh
    - tools/scripts/test-social-spotify.sh
    - tools/scripts/test-error-handling.sh
